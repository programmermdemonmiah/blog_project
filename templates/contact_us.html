{% extends "layout/base.html" %}

{% block content %}

<section class="page-hero">
    <div class="container text-center">
        <h1 class="page-hero-title">Get In Touch</h1>
        <p class="page-hero-subtitle">Have a question or want to collaborate? We'd love to hear from you.</p>
    </div>
</section>

<section class="contact-section py-5">
    <div class="container">
        <div class="row g-5 justify-content-center">
            <div class="col-lg-5">
                <div class="contact-info-card">
                    <div class="contact-info-item">
                        <div class="contact-icon">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <div>
                            <h6>Email</h6>
                            <p class="mb-0">info@deepverselab.com</p>
                        </div>
                    </div>
                    <div class="contact-info-item">
                        <div class="contact-icon">
                            <i class="fas fa-map-marker-alt"></i>
                        </div>
                        <div>
                            <h6>Location</h6>
                            <p class="mb-0">San Francisco, CA</p>
                        </div>
                    </div>
                    <div class="contact-info-item">
                        <div class="contact-icon">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div>
                            <h6>Response Time</h6>
                            <p class="mb-0">Within 24 hours</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="contact-form-card">
                    <h3 class="mb-4">Send us a Message</h3>
                    <form method="POST" action="{% url 'business:contact_submit' %}">
                        {% csrf_token %}
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" name="name" class="form-control" id="name" placeholder="Your Name" value="{{ old.name }}" required>
                                    <label for="name">Your Name</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="email" name="email" class="form-control" id="email" placeholder="Your Email" value="{{ old.email }}" required>
                                    <label for="email">Your Email</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="text" name="subject" class="form-control" id="subject" placeholder="Subject" value="{{ old.subject }}" required>
                                    <label for="subject">Subject</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-floating">
                                    <textarea name="message" class="form-control" id="message" placeholder="Your Message" style="height: 150px" required>{{ old.message }}</textarea>
                                    <label for="message">Your Message</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-submit-message w-100">
                                    <i class="fas fa-paper-plane me-2"></i>Send Message
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
